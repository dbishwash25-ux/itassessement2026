<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/images/logo/image-removebg-preview.png" type="image/png">
  <title>8/11 BOYS HOSTEL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/styles/contact.css">
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="logo">
        <img src="/images/logo/image-removebg-preview.png" alt="Hostel Logo" class="logo-img">
        <span>8 eleven Boys Hostel</span>
    </div>
    <nav>
      <a href="/templates/index.html">Home</a>
      <a href="/templates/facilities.html">Facilities</a>
      <a href="/templates/about.html">About Us</a>
      <a href="/templates/contact.html">Contact</a>
      <a href="/templates/gallery.html">Gallery</a>
      <button id="themeToggle">🌙</button>
    </nav>
  </header>


  <!-- CONTACT SECTION -->
<section class="contact-section">
  <div class="contact-container">
    
    <h2>Contact Us</h2>
    <p class="contact-subtext">We’d love to hear from you! Send us a message.</p>

    <form class="contact-form" id="contactForm">
      
      <div class="input-group">
        <input type="text" id="name" required placeholder=" ">
        <label>Your Name</label>
        <small class="error"></small>
      </div>

      <div class="input-group">
        <input type="email" id="email" required placeholder=" ">
        <label>Email Address</label>
        <small class="error"></small>
      </div>

      <div class="input-group">
        <input type="tel" id="phone" required placeholder=" ">
        <label>Phone no.</label>
        <small class="error"></small>
      </div>      

      <div class="input-group">
        <textarea id="message" rows="4" required placeholder=" "></textarea>
        <label>Your Message</label>
        <small class="error"></small>
      </div>

      <button type="submit" class="submit-btn">Send Message</button>
    
    </form>
  </div>
</section>


  <!-- FOOTER -->
  <footer>
    <p>© 2026 | 8 eleven Boys Hostel • All Rights Reserved</p>
    <p>📍Location: Anamnagar • 📞 Contact: +977 976-5627794</p>
  </footer>

<script>
  const toggle = document.getElementById("themeToggle");
  const body = document.body;

  // Load saved theme on page load
  const savedTheme = localStorage.getItem("theme") || "dark";
  body.classList.add(savedTheme);
  toggle.textContent = savedTheme === "dark" ? "☀️" : "🌙";

  toggle.addEventListener("click", () => {
    body.classList.toggle("dark");
    body.classList.toggle("light");

    const currentTheme = body.classList.contains("dark") ? "dark" : "light";
    localStorage.setItem("theme", currentTheme);

    toggle.textContent = currentTheme === "dark" ? "☀️" : "🌙";
  });
</script>

<script>
const form = document.getElementById("contactForm");
const nameInput = document.getElementById("name");
const emailInput = document.getElementById("email");
const phoneInput = document.getElementById("phone");
const messageInput = document.getElementById("message");

function showError(input, message) {
  const group = input.parentElement;
  const error = group.querySelector(".error");

  group.classList.add("error");
  group.classList.remove("success");
  error.textContent = message;
}

function showSuccess(input) {
  const group = input.parentElement;
  const error = group.querySelector(".error");

  group.classList.remove("error");
  group.classList.add("success");
  error.textContent = "";
}

function validateEmail(email) {
  return /^[^ ]+@[^ ]+\.[a-z]{2,3}$/.test(email);
}

function validatePhone(phone) {
  return /^[0-9]{7,15}$/.test(phone);
}

form.addEventListener("submit", function(e) {
  e.preventDefault();

  let isValid = true;

  // NAME
  if (nameInput.value.trim() === "") {
    showError(nameInput, "Name is required");
    isValid = false;
  } else {
    showSuccess(nameInput);
  }

  // EMAIL
  if (emailInput.value.trim() === "") {
    showError(emailInput, "Email is required");
    isValid = false;
  } else if (!validateEmail(emailInput.value)) {
    showError(emailInput, "Enter a valid email");
    isValid = false;
  } else {
    showSuccess(emailInput);
  }

  // PHONE
  if (phoneInput.value.trim() === "") {
    showError(phoneInput, "Phone is required");
    isValid = false;
  } else if (!validatePhone(phoneInput.value)) {
    showError(phoneInput, "Enter valid phone number");
    isValid = false;
  } else {
    showSuccess(phoneInput);
  }

  // MESSAGE
  if (messageInput.value.trim() === "") {
    showError(messageInput, "Message cannot be empty");
    isValid = false;
  } else if (messageInput.value.length < 10) {
    showError(messageInput, "*Minimum 10 characters");
    isValid = false;
  } else {
    showSuccess(messageInput);
  }

  // SUCCESS
  if (isValid) {
    form.reset();

    const successMsg = document.createElement("div");
    successMsg.classList.add("form-success");
    successMsg.textContent = "✅ Message sent successfully!";

    form.appendChild(successMsg);

    setTimeout(() => successMsg.remove(), 3000);
  }
});
</script>

</body>
</html>
